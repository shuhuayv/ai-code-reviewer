server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ai-code-reviewer
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/${DB_NAME:ai_code_reviewer}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:ai_dev}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

app:
  repo:
    base-dir: ${REPO_BASE_DIR:repos}
    max-file-size: ${MAX_FILE_SIZE:200000}
    max-total-chars: ${MAX_TOTAL_CHARS:60000}

ai:
  mock-enabled: ${AI_MOCK_ENABLED:true}
  provider: ${AI_PROVIDER:mock}
  api-key: ${AI_API_KEY:${ZHIPU_API_KEY:}}
  api-base-url: ${AI_API_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
  model: ${AI_MODEL:glm-4.7-flash}
  timeout-seconds: ${AI_TIMEOUT_SECONDS:30}
  max-tokens: ${AI_MAX_TOKENS:2048}
  temperature: ${AI_TEMPERATURE:0.2}